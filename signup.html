<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Resume Builder</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #1e3a8a 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .auth-container {
      background: white;
      padding: 50px 40px;
      border-radius: 20px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .logo {
      font-size: 28px;
      font-weight: 700;
      color: #1e3a8a;
      margin-bottom: 10px;
    }

    .logo span {
      color: #fbbf24;
    }

    .auth-container h2 {
      color: #333;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .auth-container .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .input-group label {
      display: block;
      color: #333;
      font-weight: 500;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .auth-container input {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 15px;
      transition: 0.3s;
    }

    .auth-container input:focus {
      outline: none;
      border-color: #1e3a8a;
      box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
    }

    .auth-container button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      background: linear-gradient(135deg, #1e3a8a, #3b82f6);
      color: white;
      font-size: 16px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .auth-container button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(30, 58, 138, 0.3);
    }

    .auth-container p {
      margin-top: 25px;
      color: #666;
      font-size: 14px;
    }

    .auth-container a {
      color: #1e3a8a;
      text-decoration: none;
      font-weight: 600;
    }

    .auth-container a:hover {
      text-decoration: underline;
    }

    .back-home {
      display: inline-block;
      margin-top: 20px;
      color: #666;
      font-size: 14px;
      text-decoration: none;
    }

    .back-home:hover {
      color: #1e3a8a;
    }

    .features-list {
      text-align: left;
      margin: 25px 0;
      padding: 20px;
      background: #f8fafc;
      border-radius: 10px;
    }

    .features-list li {
      list-style: none;
      padding: 8px 0;
      color: #333;
      font-size: 14px;
    }

    .features-list li::before {
      content: "✓";
      color: #059669;
      font-weight: bold;
      margin-right: 10px;
    }

    /* RESPONSIVE STYLES */
    @media (max-width: 768px) {
      body {
        padding: 15px;
      }

      .auth-container {
        padding: 35px 25px;
        border-radius: 16px;
      }

      .logo {
        font-size: 24px;
      }

      .auth-container h2 {
        font-size: 22px;
      }

      .auth-container input {
        font-size: 16px; /* Prevents zoom on iOS */
        padding: 14px;
      }

      .auth-container button {
        padding: 14px;
        font-size: 15px;
      }

      .features-list {
        padding: 15px;
      }

      .features-list li {
        font-size: 13px;
      }
    }

    @media (max-width: 480px) {
      .auth-container {
        padding: 30px 20px;
      }

      .logo {
        font-size: 22px;
      }

      .auth-container h2 {
        font-size: 20px;
      }

      .input-group label {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>

<div class="auth-container">
  <div class="logo">Resume<span>Builder</span></div>
  <h2>Create Your Account</h2>
  <p class="subtitle">Start building professional resumes for free</p>

  <div class="input-group">
    <label for="signupEmail">Email Address</label>
    <input type="email" id="signupEmail" placeholder="Enter your email">
  </div>

  <div class="input-group">
    <label for="signupPassword">Password</label>
    <input type="password" id="signupPassword" placeholder="Create a password (min 6 characters)">
  </div>

  <button id="signupBtn">Create Free Account</button>

  <ul class="features-list">
    <li>20+ Professional Templates</li>
    <li>AI-Powered Summary Generator</li>
    <li>Download as PDF</li>
    <li>No Credit Card Required</li>
  </ul>

  <p>Already have an account? <a href="login.html">Sign In</a></p>
  <a href="index.html" class="back-home">← Back to Home</a>
</div>

<script type="module" src="auth.js"></script>
</body>
</html>
